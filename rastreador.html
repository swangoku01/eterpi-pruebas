<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celular - Transmisor GPS</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Preparando canal nativo...</div>
    </div>

    <script>
        window.onload = function() {
            // URL directa con tu API Key integrada para autenticación inmediata
            const urlFirebase = "https://firebaseio.com";

            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Por favor, otorga el permiso de ubicación.";

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((posicion) => {
                    const datos = {
                        lat: posicion.coords.latitude,
                        lon: posicion.coords.longitude,
                        timestamp: Date.now()
                    };

                    // Túnel XMLHttpRequest (Inmune a los bloqueos de Fetch)
                    const xhr = new XMLHttpRequest();
                    xhr.open("PUT", urlFirebase, true);
                    xhr.setRequestHeader("Content-Type", "application/json");
                    
                    xhr.onreadystatechange = function () {
                        if (xhr.readyState === 4) {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                                document.getElementById('titulo').style.color = "#4CAF50";
                                document.getElementById('estado').innerHTML = `¡Datos enviados a Firebase!<br><b>Lat:</b> ${datos.lat.toFixed(5)}<br><b>Lon:</b> ${datos.lon.toFixed(5)}`;
                            } else {
                                document.getElementById('estado').innerText = "Firebase rechazó la conexión. Código: " + xhr.status;
                            }
                        }
                    };

                    xhr.onerror = function () {
                        document.getElementById('estado').innerText = "Error físico de conexión en el canal.";
                    };

                    xhr.send(JSON.stringify(datos));

                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Error GPS";
                    document.getElementById('estado').innerText = "No se pudo obtener señal: " + error.message;
                }, { 
                    enableHighAccuracy: false, // Permite antenas de red para respuesta inmediata
                    timeout: 15000,
                    maximumAge: 0
                });
            } else {
                document.getElementById('titulo').innerText = "❌ No Soportado";
                document.getElementById('estado').innerText = "Este equipo no soporta geolocalización.";
            }
        };
    </script>
</body>
</html>
