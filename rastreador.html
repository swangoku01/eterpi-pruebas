<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celular - Transmisor GPS</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Preparando canal inmune...</div>
    </div>

    <!-- Cargamos el motor alterno de PubNub -->
    <script src="https://pubnub.com"></script>

    <script>
        window.onload = function() {
            // Llaves públicas de desarrollo para tu canal de pruebas
            const pubnub = new PubNub({
                publishKey: 'pub-c-4c6e93cb-c472-4752-9599-5efdf8ba9656',
                subscribeKey: 'sub-c-11226d9e-1011-4f8a-9fb8-51e0cfdc270b',
                userId: 'celular_emisor'
            });

            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Por favor, otorga el permiso de ubicación.";

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((posicion) => {
                    const datos = {
                        lat: posicion.coords.latitude,
                        lon: posicion.coords.longitude
                    };

                    // Transmisión directa por el canal alternativo
                    pubnub.publish({
                        channel: 'canal-gps-pruebas',
                        message: datos
                    }, function(status, response) {
                        if (!status.error) {
                            document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                            document.getElementById('titulo').style.color = "#4CAF50";
                            document.getElementById('estado').innerHTML = `¡Datos enviados por canal seguro!<br><b>Lat:</b> ${datos.lat.toFixed(5)}<br><b>Lon:</b> ${datos.lon.toFixed(5)}`;
                        }
                    });

                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Error GPS";
                    document.getElementById('estado').innerText = "Revisa los permisos: " + error.message;
                }, { enableHighAccuracy: false, timeout: 15000 });
            }
        };
    </script>
</body>
</html>
