<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celular - Transmisor GPS Fijo</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Activando canal seguro...</div>
    </div>

    <script>
        window.onload = function() {
            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Por favor, otorga el permiso de ubicación.";

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((posicion) => {
                    const lat = posicion.coords.latitude;
                    const lon = posicion.coords.longitude;
                    const tiempo = Date.now();

                    // URL PERFECTA: Apunta a tu base de datos real sin romper la sintaxis
                    const urlFirebase = "https://firebaseio.com" + tiempo;

                    // El truco del script para saltar los bloqueos CORS de tu red móvil
                    const scriptBypass = document.createElement('script');
                    scriptBypass.src = urlFirebase; 
                    scriptBypass.className = 'script-movil';

                    const viejos = document.querySelectorAll('.script-movil');
                    viejos.forEach(s => s.remove());

                    document.body.appendChild(scriptBypass);

                    document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                    document.getElementById('titulo').style.color = "#4CAF50";
                    document.getElementById('estado').innerHTML = `¡Datos enviados a tu Firebase!<br><b>Lat:</b> ${lat.toFixed(5)}<br><b>Lon:</b> ${lon.toFixed(5)}`;

                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Error GPS";
                    document.getElementById('estado').innerText = "Sensor bloqueado: " + error.message;
                }, { enableHighAccuracy: false, timeout: 15000, maximumAge: 0 });
            }
        };
    </script>
</body>
</html>
