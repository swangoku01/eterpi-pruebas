<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celular - Transmisor GPS</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Activando sensores...</div>
    </div>

    <script>
        window.onload = function() {
            // URL limpia para inyectar datos directamente mediante la API REST de Google
            const urlFirebase = "https://firebaseio.com";

            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Por favor, permite el acceso a la ubicación si aparece el cuadro flotante.";

            if (navigator.geolocation) {
                // watchPosition despierta inmediatamente los sensores físicos del dispositivo
                navigator.geolocation.watchPosition((posicion) => {
                    const datos = {
                        lat: posicion.coords.latitude,
                        lon: posicion.coords.longitude,
                        timestamp: Date.now()
                    };

                    // Túnel XMLHttpRequest tradicional (Bypass total de políticas CORS de scripts externos)
                    const xhr = new XMLHttpRequest();
                    xhr.open("PUT", urlFirebase, true);
                    
                    // Al no usar Content-Type JSON estricto, el navegador lo envía como petición simple libre de CORS
                    xhr.setRequestHeader("Content-Type", "text/plain");
                    
                    xhr.onreadystatechange = function () {
                        if (xhr.readyState === 4) {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                                document.getElementById('titulo').style.color = "#4CAF50";
                                document.getElementById('estado').innerHTML = `¡Conectado e inyectando datos!<br><b>Lat:</b> ${datos.lat.toFixed(5)}<br><b>Lon:</b> ${datos.lon.toFixed(5)}`;
                            } else {
                                document.getElementById('estado').innerText = "Error de canal Firebase. Código: " + xhr.status;
                            }
                        }
                    };

                    xhr.send(JSON.stringify(datos));

                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Bloqueo de GPS";
                    document.getElementById('titulo').style.color = "#f44336";
                    document.getElementById('estado').innerText = "El navegador bloqueó el sensor GPS. Detalle: " + error.message;
                }, { 
                    enableHighAccuracy: false, // Desactivado para forzar respuesta rápida por Wi-Fi/Red sin esperar satélites
                    timeout: 20000,
                    maximumAge: 0 
                });
            } else {
                document.getElementById('titulo').innerText = "❌ No Soportado";
                document.getElementById('estado').innerText = "Este equipo no soporta geolocalización web.";
            }
        };
    </script>
</body>
</html>
