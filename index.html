<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor GPS 100% Autónomo</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Cargando motor local integrado...</div>
    </div>

    <!-- LIBRERÍA 1: MOTOR BASE DE FIREBASE INTEGRADO EN TEXTO PLANO -->
    <script>!function(e,t){"object"==typeof exports&&"undefined"!=typeof module?module.exports=t():"function"==typeof define&&define.amd?define(t):(e=e||self).firebase=t()}(this,function(){var e=function(e){return function(t){for(var r=[],n=1;n<arguments.length;n++)r[n-1]=arguments[n];var a=new Error(t);a.code="app/"+e;var i=a.toString();return a.message=r.reduce(function(e,t,r){return e.replace("{"+r+"}",t)},i),a}}("not-loaded"),t=function(){function t(e,t,r){this.name=e,this.options=t,this.firebase_=r}return t.prototype.delete=function(){return this.firebase_.INTERNAL.removeApp(this.name)},t}(),r=function(){function e(){this.apps_={},this.PLATFORM_VERSION="10.12.0"}return e.prototype.initializeApp=function(e,r){void 0===r&&(r="[DEFAULT]");var n=new t(r,e,this);return this.apps_[r]=n,n},e.prototype.app=function(e){void 0===e&&(e="[DEFAULT]");var t=this.apps_[e];if(!t)throw new Error("No App '"+e+"'");return t},e}();return window.firebase=new r,window.firebase});</script>

    <!-- LIBRERÍA 2: SCRIPT DE BASE DE DATOS COMPACTADO NATIVO -->
    <script>!function(){if("undefined"!=typeof firebase){firebase.INTERNAL=firebase.INTERNAL||{},firebase.INTERNAL.removeApp=function(e){delete firebase.apps_[e]};var e=firebase.initializeApp;firebase.initializeApp=function(t,r){var n=e.call(firebase,t,r);return n.database=function(){return{ref:function(e){return{set:function(r){var n=new XMLHttpRequest;n.open("PUT",t.databaseURL+"/"+e+".json?auth="+t.apiKey,!0),n.setRequestHeader("Content-Type","application/json"),n.send(JSON.stringify(r))}}}}}},n};}else{console.error("Firebase base no detectado");}}();</script>

    <script>
        window.onload = function() {
            // Tus credenciales validadas de eterpi-pruebas
            const firebaseConfig = {
              apiKey: "AIzaSyAjwC0kd0MfffW3ybzK_ypmNLCBH_QbfWQ",
              authDomain: "://firebaseapp.com",
              databaseURL: "https://firebaseio.com",
              projectId: "eterpi-pruebas",
              storageBucket: "eterpi-pruebas.firebasestorage.app",
              messagingSenderId: "271356311805",
              appId: "1:271356311805:web:4cf25310c27786b1d7e694",
              measurementId: "G-GHXW8G3JL4"
            };

            // Arrancar el motor interno clonado
            const app = firebase.initializeApp(firebaseConfig);
            const database = app.database();

            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Motor local cargado con éxito. Esperando respuesta del hardware GPS...";

            // Solicitar coordenadas al teléfono / computadora
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((posicion) => {
                    const lat = posicion.coords.latitude;
                    const lon = posicion.coords.longitude;

                    // Enviar datos usando nuestra mini-conexión HTTP directa bypass
                    database.ref('ubicacion_celular').set({
                        lat: lat,
                        lon: lon,
                        timestamp: Date.now()
                    });

                    document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                    document.getElementById('titulo').style.color = "#4CAF50";
                    document.getElementById('estado').innerHTML = `¡Conectado e inyectando datos!<br><b>Lat:</b> ${lat.toFixed(5)}<br><b>Lon:</b> ${lon.toFixed(5)}`;
                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Bloqueo de GPS";
                    document.getElementById('titulo').style.color = "#f44336";
                    document.getElementById('estado').innerText = "El motor interno está listo, pero el navegador bloqueó el sensor GPS. Detalles: " + error.message;
                }, { 
                    enableHighAccuracy: false, // Uso de antenas de red para respuesta inmediata sin esperar satélites externos
                    timeout: 15000,
                    maximumAge: 0 
                });
            } else {
                document.getElementById('estado').innerText = "Este equipo no soporta geolocalización.";
            }
        };
    </script>
</body>
</html>
