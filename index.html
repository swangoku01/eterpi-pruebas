<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor GPS Directo</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Iniciando</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Solicitando acceso al hardware GPS...</div>
    </div>

    <script>
        // Enlace directo en formato JSON a tu base de datos en tiempo real de Firebase
        const urlBaseDatos = "https://firebaseio.com";

        window.onload = function() {
            // Verificar si el dispositivo tiene soporte de localización
            if (navigator.geolocation) {
                
                document.getElementById('titulo').innerText = "📡 Esperando GPS";
                document.getElementById('titulo').style.color = "#2196F3";
                document.getElementById('estado').innerText = "Por favor, acepta el permiso de ubicación en la alerta de tu pantalla.";

                // watchPosition despierta los sensores de ubicación del equipo inmediatamente
                navigator.geolocation.watchPosition((posicion) => {
                    const datos = {
                        lat: posicion.coords.latitude,
                        lon: posicion.coords.longitude,
                        timestamp: Date.now()
                    };

                    // Envío directo mediante protocolo HTTP PUT (Sin usar librerías de Firebase)
                    fetch(urlBaseDatos, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(datos)
                    })
                    .then(response => {
                        if(response.ok) {
                            document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                            document.getElementById('titulo').style.color = "#4CAF50";
                            document.getElementById('estado').innerHTML = `¡Datos enviados a Firebase!<br><b>Lat:</b> ${datos.lat.toFixed(5)}<br><b>Lon:</b> ${datos.lon.toFixed(5)}`;
                        } else {
                            document.getElementById('estado').innerText = "Error al enviar los datos a Firebase.";
                        }
                    })
                    .catch(err => {
                        document.getElementById('estado').innerText = "Fallo de conexión de red: " + err.message;
                    });

                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Bloqueo de GPS";
                    document.getElementById('titulo').style.color = "#f44336";
                    
                    // Traducción de errores para saber exactamente qué pasó
                    let mensajeError = "";
                    if (error.code === 1) mensajeError = "Denegaste el permiso de ubicación en el navegador.";
                    if (error.code === 2) mensajeError = "La señal GPS de tu entorno no está disponible (Prueba salir a la ventana).";
                    if (error.code === 3) mensajeError = "Se agotó el tiempo de espera del sensor.";
                    
                    document.getElementById('estado').innerText = mensajeError || error.message;
                }, { 
                    enableHighAccuracy: false, // Permite usar Wi-Fi y torres de red para respuesta inmediata
                    timeout: 20000,
                    maximumAge: 0 
                });
            } else {
                document.getElementById('titulo').innerText = "❌ No Soportado";
                document.getElementById('estado').innerText = "Este equipo no cuenta con soporte de geolocalización.";
            }
        };
    </script>
</body>
</html>
