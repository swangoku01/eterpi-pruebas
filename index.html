<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisor GPS Corregido</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px; background-color: #fafafa;">

    <div style="background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 280px;">
        <h1 id="titulo" style="color: #ff9800; margin-top: 0;">⏳ Cargando Sistemas</h1>
        <div id="estado" style="font-size: 1.2em; color: #666;">Conectando con los servidores de Google...</div>
    </div>

    <!-- Cargamos las librerías desde un servidor alternativo ultra estable (cdnjs) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // Esta función se ejecuta OBLIGATORIAMENTE hasta que toda la página y sus scripts se descargaron por completo
        window.onload = function() {
            // Verificación de seguridad en la consola
            if (typeof firebase === 'undefined') {
                document.getElementById('titulo').innerText = "❌ Error Crítico";
                document.getElementById('titulo').style.color = "red";
                document.getElementById('estado').innerHTML = "Las librerías de Firebase no se pudieron descargar.<br><small>Verifica tu conexión a internet o desactiva tu antivirus temporalmente.</small>";
                return; // Detiene el código para que no tire error en consola
            }

            // Tus credenciales validadas
            const firebaseConfig = {
              apiKey: "AIzaSyAjwC0kd0MfffW3ybzK_ypmNLCBH_QbfWQ",
              authDomain: "://firebaseapp.com",
              databaseURL: "https://firebaseio.com",
              projectId: "eterpi-pruebas",
              storageBucket: "eterpi-pruebas.firebasestorage.app",
              messagingSenderId: "271356311805",
              appId: "1:271356311805:web:4cf25310c27786b1d7e694",
              measurementId: "G-GHXW8G3JL4"
            };

            // Inicializar Firebase de forma segura
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            document.getElementById('titulo').innerText = "📡 Buscando GPS";
            document.getElementById('titulo').style.color = "#2196F3";
            document.getElementById('estado').innerText = "Firebase conectado. Por favor, dale 'Permitir' a la alerta de ubicación de tu pantalla.";

            // Activar el rastreador de ubicación
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((posicion) => {
                    const lat = posicion.coords.latitude;
                    const lon = posicion.coords.longitude;

                    // Enviar los datos en tiempo real
                    database.ref('ubicacion_celular').set({
                        lat: lat,
                        lon: lon,
                        timestamp: Date.now()
                    });

                    document.getElementById('titulo').innerText = "🟢 Transmitiendo";
                    document.getElementById('titulo').style.color = "#4CAF50";
                    document.getElementById('estado').innerHTML = `Posición enviada con éxito:<br><b>Lat:</b> ${lat.toFixed(5)}<br><b>Lon:</b> ${lon.toFixed(5)}`;
                }, (error) => {
                    document.getElementById('titulo').innerText = "⚠️ Permiso Denegado";
                    document.getElementById('titulo').style.color = "#f44336";
                    document.getElementById('estado').innerText = "Firebase está listo, pero tu navegador o tu celular bloquearon el acceso al GPS. Error: " + error.message;
                }, { 
                    enableHighAccuracy: false, // Desactivado para que responda instantáneamente con antenas de red
                    timeout: 20000,
                    maximumAge: 0 
                });
            } else {
                document.getElementById('estado').innerText = "Este dispositivo no cuenta con sensor GPS compatible.";
            }
        };
    </script>
</body>
</html>
