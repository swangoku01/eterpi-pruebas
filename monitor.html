<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor GPS - Canal Seguro</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .caja { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 600px; margin: 0 auto; }
        #mapa-imagen { width: 100%; max-width: 500px; height: 400px; border-radius: 8px; border: 2px solid #ccc; margin-top: 15px; background: #e5e3df; }
        .datos { font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

<div class="caja">
    <h2>📍 Monitoreo en Tiempo Real (Receptor)</h2>
    <p>Estado del enlace: <span id="estado" style="color: #ff9800; font-weight: bold;">⏳ ESPERANDO SEÑAL DEL TELÉFONO...</span></p>
    <p>Latitud: <span id="lat" class="datos">--</span> | Longitud: <span id="lon" class="datos">--</span></p>
    
    <img id="mapa-imagen" src="" alt="Esperando coordenadas para dibujar el mapa...">
</div>

<script src="https://pubnub.com"></script>

<script>
    window.onload = function() {
        const pubnub = new PubNub({
            subscribeKey: 'sub-c-11226d9e-1011-4f8a-9fb8-51e0cfdc270b',
            userId: 'computadora_monitor'
        });

        // Escuchar el canal seguro en segundo plano de manera continua
        pubnub.addListener({
            message: function(event) {
                const datos = event.message;
                if (datos && datos.lat && datos.lon) {
                    document.getElementById('estado').innerText = "🟢 DISPOSITIVO EN VIVO";
                    document.getElementById('estado').style.color = "#4CAF50";
                    document.getElementById('lat').innerText = datos.lat.toFixed(5);
                    document.getElementById('lon').innerText = datos.lon.toFixed(5);

                    // Renderizar mapa de calles estático
                    const urlMapa = "https://geoapify.com:" + datos.lon + "," + datos.lat + "&zoom=15&marker=lonlat:" + datos.lon + "," + datos.lat + ";color:%23ff0000;size:medium&apiKey=free";
                    document.getElementById('mapa-imagen').src = urlMapa;
                }
            }
        });

        pubnub.subscribe({
            channels: ['canal-gps-pruebas']
        });
    };
</script>
</body>
</html>
