<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor GPS - Canal Remoto</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .caja { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 600px; margin: 0 auto; }
        #mapa-imagen { width: 100%; max-width: 500px; height: 400px; border-radius: 8px; border: 2px solid #ccc; margin-top: 15px; background: #e5e3df; }
        .datos { font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

<div class="caja">
    <h2>📍 Monitoreo en Tiempo Real (Receptor)</h2>
    <p>Estado del enlace: <span id="estado" style="color: #ff9800; font-weight: bold;">⏳ ESPERANDO SEÑAL DEL TELÉFONO...</span></p>
    <p>Latitud: <span id="lat" class="datos">--</span> | Longitud: <span id="lon" class="datos">--</span></p>
    
    <img id="mapa-imagen" src="" alt="Esperando coordenadas para dibujar el mapa...">
</div>

<script>
    function traerDatosDesdeFirebase() {
        const dominioBase = "https://eterpi-pruebas-default-rtdb.firebaseio.com/";
        const claveAcceso = "AIzaSyAjwC0kd0MfffW3ybzK_ypmNLCBH_QbfWQ";
        const tiempoCache = Date.now();

        // CAMBIO CLAVE: Consultamos la raíz completa (.json) para buscar la información en todo el proyecto
        const urlFinal = dominioBase + ".json?key=" + claveAcceso + "&nocache=" + tiempoCache;

        const xhr = new XMLHttpRequest();
        xhr.open("GET", urlFinal, true);
        
        xhr.onreadystatechange = function () {
            if (xhr.readyState === 4 && xhr.status === 200) {
                const proyectoCompleto = JSON.parse(xhr.responseText);
                
                if (proyectoCompleto) {
                    let latEncontrada = null;
                    let lonEncontrada = null;

                    // 1. BUSCADOR AUTOMÁTICO EN PROFUNDIDAD: Escanea las estructuras posibles
                    if (proyectoCompleto.lat && proyectoCompleto.lon) {
                        latEncontrada = proyectoCompleto.lat;
                        lonEncontrada = proyectoCompleto.lon;
                    } else if (proyectoCompleto.ubicacion_celular) {
                        const nodoCelular = proyectoCompleto.ubicacion_celular;
                        
                        if (nodoCelular.lat && nodoCelular.lon) {
                            latEncontrada = nodoCelular.lat;
                            lonEncontrada = nodoCelular.lon;
                        } else {
                            // Si Firebase guardó un historial con claves únicas, extrae el registro más reciente
                            const llaves = Object.keys(nodoCelular);
                            if (llaves.length > 0) {
                                const ultimaLlave = llaves[llaves.length - 1];
                                const ultimoRegistro = nodoCelular[ultimaLlave];
                                if (ultimoRegistro && ultimoRegistro.lat && ultimoRegistro.lon) {
                                    latEncontrada = ultimoRegistro.lat;
                                    lonEncontrada = ultimoRegistro.lon;
                                }
                            }
                        }
                    }

                    // 2. Si el escáner rescata las coordenadas, pintamos el mapa de inmediato
                    if (latEncontrada && lonEncontrada) {
                        const latNum = Number(latEncontrada);
                        const lonNum = Number(lonEncontrada);

                        document.getElementById('estado').innerText = "🟢 DISPOSITIVO EN VIVO";
                        document.getElementById('estado').style.color = "#4CAF50";
                        document.getElementById('lat').innerText = latNum.toFixed(5);
                        document.getElementById('lon').innerText = lonNum.toFixed(5);

                        // Cargar mapa estático
                        const urlMapa = "https://geoapify.com:" + lonNum + "," + latNum + "&zoom=15&marker=lonlat:" + lonNum + "," + latNum + ";color:%23ff0000;size:medium&apiKey=free";
                        document.getElementById('mapa-imagen').src = urlMapa;
                    }
                }
            }
        };
        xhr.send();
    }

    // Consulta en bucle cada 3 segundos
    setInterval(traerDatosDesdeFirebase, 3000);
    traerDatosDesdeFirebase();
</script>
</body>
</html>
