<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor GPS - Canal Remoto Real</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .caja { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 600px; margin: 0 auto; }
        #mapa-imagen { width: 100%; max-width: 500px; height: 400px; border-radius: 8px; border: 2px solid #ccc; margin-top: 15px; background: #e5e3df; }
        .datos { font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

<div class="caja">
    <h2>📍 Monitoreo en Tiempo Real (Receptor)</h2>
    <p>Estado del enlace: <span id="estado" style="color: #ff9800; font-weight: bold;">⏳ ESPERANDO SEÑAL REAL...</span></p>
    <p>Latitud: <span id="lat" class="datos">--</span> | Longitud: <span id="lon" class="datos">--</span></p>
    
    <!-- Imagen del mapa corregida -->
    <img id="mapa-imagen" src="" alt="Esperando señal del teléfono para dibujar el mapa...">
</div>

<script>
    // 1. Esta función recibe los datos reales de tu Firebase de forma automática
    window.procesarDatosCelular = function(datos) {
        if (datos && datos.lat && datos.lon) {
            const latNum = Number(datos.lat);
            const lonNum = Number(datos.lon);

            document.getElementById('estado').innerText = "🟢 DISPOSITIVO EN VIVO";
            document.getElementById('estado').style.color = "#4CAF50";
            document.getElementById('lat').innerText = latNum.toFixed(5);
            document.getElementById('lon').innerText = lonNum.toFixed(5);

            // CORRECCIÓN DE LA URL DEL MAPA: Estructura limpia y con barras "/" correspondientes
            const urlMapa = "https://yandex.ru" + lonNum + "," + latNum + "&z=16&l=map&pt=" + lonNum + "," + latNum + ",pm2rdm";
            document.getElementById('mapa-imagen').src = urlMapa;
        }
    };

    function consultarFirebaseInmune() {
        const timestamp = Date.now();
        
        // 2. Dirección oficial de tu proyecto Firebase (eterpi-pruebas-default-rtdb)
        // Usamos el parámetro 'callback' para burlar el bloqueo Failed to Fetch / CORS
        const urlFirebase = "https://firebaseio.com" + timestamp;

        // Inyección dinámica de script (Igual a la técnica de tu celular que sí funciona)
        const scriptBypassPC = document.createElement('script');
        scriptBypassPC.src = urlFirebase;
        scriptBypassPC.id = 'script-temporal-pc';

        const scriptViejo = document.getElementById('script-temporal-pc');
        if (scriptViejo) scriptViejo.remove();

        document.body.appendChild(scriptBypassPC);
    }

    // Consulta real en vivo cada 3 segundos
    setInterval(consultarFirebaseInmune, 3000);
    consultarFirebaseInmune();
</script>
</body>
</html>
