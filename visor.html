<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor GPS - Conexión Directa</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .caja { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 600px; margin: 0 auto; }
        #mapa-imagen { width: 100%; max-width: 500px; height: 400px; border-radius: 8px; border: 2px solid #ccc; margin-top: 15px; background: #e5e3df; }
        .datos { font-weight: bold; color: #2196F3; }
    </style>
</head>
<body>

<div class="caja">
    <h2>📍 Monitoreo en Tiempo Real (Receptor)</h2>
    <p>Estado del enlace: <span id="estado" style="color: #ff9800; font-weight: bold;">⏳ ESPERANDO SEÑAL REAL...</span></p>
    <p>Latitud: <span id="lat" class="datos">--</span> | Longitud: <span id="lon" class="datos">--</span></p>
    
    <img id="mapa-imagen" src="" alt="Esperando señal del teléfono para dibujar el mapa...">
</div>

<script>
    function consultarDatosReales() {
        // Usamos una petición limpia con la función nativa FETCH apuntando estrictamente al nodo JSON
        // Le agregamos un número aleatorio al final para obligar a GitHub a romper la caché en cada segundo
        const urlFinal = "https://firebaseio.com" + Date.now();

        fetch(urlFinal)
        .then(res => res.json())
        .then(datos => {
            if (datos && datos.lat && datos.lon) {
                const latNum = Number(datos.lat);
                const lonNum = Number(datos.lon);

                document.getElementById('estado').innerText = "🟢 DISPOSITIVO EN VIVO";
                document.getElementById('estado').style.color = "#4CAF50";
                document.getElementById('lat').innerText = latNum.toFixed(5);
                document.getElementById('lon').innerText = lonNum.toFixed(5);

                // Generador de mapas estáticos Geoapify
                const urlMapa = "https://geoapify.com:" + lonNum + "," + latNum + "&zoom=15&marker=lonlat:" + lonNum + "," + latNum + ";color:%23ff0000;size:medium&apiKey=free";
                document.getElementById('mapa-imagen').src = urlMapa;
            }
        })
        .catch(err => {
            console.log("Sincronizando con el teléfono...");
        });
    }

    // Consulta en bucle automatizada cada 3 segundos
    setInterval(consultarDatosReales, 3000);
    consultarDatosReales();
</script>
</body>
</html>
